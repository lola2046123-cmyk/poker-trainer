<!DOCTYPE html>
<html lang="zh-CN" class="dark no-tailwind">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>德州进化论：迷雾新手村</title>
  <!-- 离线兜底：Tailwind 未加载时保留基础布局，避免断网界面错乱 -->
  <style id="offline-fallback">
    .no-tailwind body { background: #0f172a; color: #e2e8f0; min-height: 100vh; margin: 0; }
    .no-tailwind #landing-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; box-sizing: border-box; }
    .no-tailwind .landing-cards { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 360px; }
    .no-tailwind .landing-cards .card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; border-radius: 22px; cursor: pointer; text-align: center; min-height: 70px; border: none; }
    .no-tailwind .landing-cards .card.red { background: linear-gradient(180deg, #FFBAB2 0%, #FF8882 100%); color: #762215; }
    .no-tailwind .landing-cards .card.blue { background: linear-gradient(180deg, #A9E0FF 0%, #56C1FF 100%); color: #0E4F7A; }
    .no-tailwind .landing-cards .card.green { background: linear-gradient(180deg, #ACFDB7 0%, #80C785 100%); color: #003601; }
    .no-tailwind #game-screen { max-width: 42rem; margin: 0 auto; padding: 1rem; box-sizing: border-box; }
    .no-tailwind header { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .no-tailwind main { padding: 1rem; }
    .no-tailwind #options-container { display: grid; gap: 0.5rem; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .no-tailwind #options-container button { padding: 0.75rem 1rem; border-radius: 12px; border: 2px solid #475569; cursor: pointer; font-size: 1rem; }
    .no-tailwind #poker-table { padding: 1rem; border-radius: 8px; background: linear-gradient(180deg, #334155 0%, #1e293b 100%); margin-bottom: 1rem; }
    .no-tailwind #scenario-zone, .no-tailwind #board-zone, .no-tailwind #hand-zone { padding: 0.5rem 0; }
  </style>
  <!-- Tailwind CSS CDN（有网时加载，会移除 .no-tailwind 使兜底样式失效；移动端延迟时也尽量移除） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script>
    (function ensureTailwind() {
      if (typeof tailwind !== 'undefined') { document.documentElement.classList.remove('no-tailwind'); return; }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', ensureTailwind);
      else setTimeout(ensureTailwind, 500);
    })();
  </script>
  <!-- 轻量级撒花库（答对时视觉反馈） -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <!-- 战绩截图：html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- Animate.css：冲印仪式感 + 教练点评 + HP 扣血动效 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <!-- 首页卡片字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@500&display=swap" rel="stylesheet">
  <style>
    /* 全局：无衬线字体；背景/文字由 Tailwind 明亮·暗黑类控制 */
    body {
      font-family: ui-sans-serif, system-ui, sans-serif, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* 磨砂玻璃按钮 */
    .btn-glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .btn-glass:active {
      transform: scale(0.97);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    /* 绿色按钮：渐变 + 圆角 30px（Green） */
    .btn-green-global {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #ACFDB7 0%, #80C785 100%) !important;
      border-radius: 30px;
      border-color: #5a9a5f;
      color: #14532d !important;
    }
    .btn-green-global:hover { filter: brightness(1.06); }
    .btn-green-global:active { filter: brightness(0.94); }

    /* 默认按钮：白/灰渐变 + 圆角 30px */
    .btn-default-white {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #FAFAFA 0%, #D1D1D1 100%) !important;
      border-radius: 30px;
      border-color: #b0b0b0;
      color: #374151 !important;
    }
    .btn-default-white:hover { filter: brightness(1.06); }
    .btn-default-white:active { filter: brightness(0.94); }

    /* 蓝色按钮：渐变 + 圆角 30px */
    .btn-blue-global {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #A9E0FF 0%, #56C1FF 100%) !important;
      border-radius: 30px;
      border-color: #3ba3e0;
      color: #0c4a6e !important;
    }
    .btn-blue-global:hover { filter: brightness(1.06); }
    .btn-blue-global:active { filter: brightness(0.94); }

    /* 红色按钮：渐变 + 圆角 30px */
    .btn-red-global {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #FFBAB2 0%, #FF8882 100%) !important;
      border-radius: 30px;
      border-color: #e85c54;
      color: #7f1d1d !important;
    }
    .btn-red-global:hover { filter: brightness(1.06); }
    .btn-red-global:active { filter: brightness(0.94); }

    /* 屏幕闪绿光（答对） */
    .flash-green {
      animation: flashGreen 0.4s ease-out;
    }
    @keyframes flashGreen {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(34, 197, 94, 0.25); }
    }

    /* 屏幕闪红光 + 震动（答错） */
    .flash-red {
      animation: flashRed 0.5s ease-out;
    }
    @keyframes flashRed {
      0%, 100% { background-color: transparent; }
      40% { background-color: rgba(239, 68, 68, 0.3); }
    }
    /* 热血状态：连对 5 题时背景微闪（橙/金） */
    .flash-combo {
      animation: flashCombo 0.6s ease-out;
    }
    @keyframes flashCombo {
      0%, 100% { background-color: transparent; }
      30% { background-color: rgba(251, 191, 36, 0.25); }
      60% { background-color: rgba(249, 115, 22, 0.2); }
    }
    .shake {
      animation: shake 0.5s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    /* 答错：短促高频水平震动（打击感） */
    .shake-screen {
      animation: shakeScreen 0.5s ease-in-out;
    }
    @keyframes shakeScreen {
      0%, 100% { transform: translateX(0); }
      10% { transform: translateX(-6px); }
      20% { transform: translateX(6px); }
      30% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
    }

    /* HP 心形：失去时为灰 + 半透明 */
    .hp-heart.hp-lost {
      color: #94a3b8 !important;
      opacity: 0.3;
      transform: scale(0.92);
    }
    .dark .hp-heart.hp-lost {
      color: #64748b !important;
    }
    .level-difficulty-badge.badge-easy { background: #22c55e; color: #fff; }
    .level-difficulty-badge.badge-medium { background: #f59e0b; color: #1f2937; }
    .level-difficulty-badge.badge-hard { background: #ef4444; color: #fff; }
    /* 扣血时心碎震动 */
    .heart-shake {
      animation: heartShake 0.45s ease-in-out;
    }
    @keyframes heartShake {
      0%, 100% { transform: translateX(0) scale(1); }
      20% { transform: translateX(-4px) scale(1.1); }
      40% { transform: translateX(4px) scale(0.95); }
      60% { transform: translateX(-3px) scale(1.02); }
      80% { transform: translateX(2px) scale(0.98); }
    }
    /* 最后一颗心闪烁警告 */
    .heart-blink {
      animation: heartBlink 1s ease-in-out infinite;
    }
    @keyframes heartBlink {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.8)); }
      50% { opacity: 0.85; filter: drop-shadow(0 0 8px rgba(239, 68, 68, 1)); }
    }

    /* Sharky 弹窗：弹性放大入场 */
    .boing-in {
      animation: boingIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes boingIn {
      0% { transform: scale(0.3); opacity: 0; }
      55% { transform: scale(1.08); opacity: 1; }
      75% { transform: scale(0.95); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* HP 进度条伸缩过渡 */
    #hp-bar-inner {
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Sharky 弹窗遮罩 */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
    }

    /* 情绪占位头像块 */
    .emotion-block {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: rgba(255,255,255,0.9);
      text-align: center;
      flex-shrink: 0;
    }

    /* 通关海报占位（渐变与边框由 Tailwind 类控制） */
    .victory-poster {
      border-radius: 16px;
    }

    /* 黑话名词高亮：荧光蓝 + 加粗发光 */
    .term-highlight {
      color: #60a5fa;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(96, 165, 250, 0.5);
    }

    /* 无牌时场景文字居中、放大视觉权重 */
    .scenario-no-cards {
      text-align: center;
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
    }

    #game-screen { display: none; }
    #game-screen.game-screen-visible { display: block; }
    .landing-btn-card {
      width: 100%;
      max-width: 20rem;
      padding: 1rem 1.25rem;
      text-align: left;
      border-radius: 12px;
      font-size: 0.9375rem;
      transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .landing-btn-card { border: 1px solid rgba(203,213,225,0.8); background: rgba(248,250,252,0.95); color: #1e293b; }
    .dark .landing-btn-card { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: #f3f4f6; }
    .landing-btn-card:hover { background: rgba(226,232,240,0.98); }
    .dark .landing-btn-card:hover { background: rgba(255,255,255,0.12); }
    .landing-btn-card:active { transform: scale(0.98); }
    .landing-btn-card .landing-btn-title { font-weight: 700; margin-bottom: 0.25rem; text-align: center; }
    .landing-btn-card .landing-btn-desc { font-size: 0.8125rem; color: #64748b; text-align: center; }
    .dark .landing-btn-card .landing-btn-desc { color: #9ca3af; }

    /* 首页选项卡片样式（缩小约 25% + 背景留白多 + 悬浮保持默认字体色） */
    .landing-cards {
      display: flex;
      flex-direction: column;
      gap: clamp(24px, 5vw, 32px);
      width: 100%;
      max-width: min(360px, 69vw);
      padding: clamp(8px, 2vw, 16px) 0;
    }
    .landing-cards .card.red {
      background: linear-gradient(180deg, #FFBAB2 0%, #FF8882 100%);
      border-radius: 22px;
      color: #762215;
    }
    .landing-cards .card.red p.tip,
    .landing-cards .card.red p.second-text { color: #762215; }
    .landing-cards .card.red:hover,
    .landing-cards .card.red:hover p.tip,
    .landing-cards .card.red:hover p.second-text { color: #762215; }
    .landing-cards .card.blue {
      background: linear-gradient(180deg, #A9E0FF 0%, #56C1FF 100%);
      border-radius: 22px;
      color: #0E4F7A;
    }
    .landing-cards .card.blue p.tip,
    .landing-cards .card.blue p.second-text { color: #0E4F7A; }
    .landing-cards .card.blue:hover,
    .landing-cards .card.blue:hover p.tip,
    .landing-cards .card.blue:hover p.second-text { color: #0E4F7A; }
    .landing-cards .card.green {
      background: linear-gradient(180deg, #ACFDB7 0%, #80C785 100%);
      border-radius: 22px;
      color: #003601;
    }
    .landing-cards .card.green p.tip,
    .landing-cards .card.green p.second-text { color: #003601; }
    .landing-cards .card.green:hover,
    .landing-cards .card.green:hover p.tip,
    .landing-cards .card.green:hover p.second-text { color: #003601; }
    .landing-cards .card.card-with-icon {
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: clamp(3px, 0.75vw, 5px);
      text-align: center;
      min-height: clamp(64px, 14vw, 110px);
      padding: clamp(0.75rem, 2vw, 1.25rem) clamp(0.9rem, 3vw, 1.35rem);
    }
    .landing-cards .card.card-with-icon .landing-card-icon {
      flex-shrink: 0;
      width: clamp(13px, 3.4vw, 24px);
      height: clamp(13px, 3.4vw, 24px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: inherit;
    }
    .landing-cards .card.card-with-icon .landing-card-icon svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .landing-cards .card.card-with-icon .landing-card-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1px;
      flex: 1;
      min-width: 0;
      max-width: none;
      text-align: center;
    }
    .landing-cards .card.card-with-icon .landing-card-text .tip,
    .landing-cards .card.card-with-icon .landing-card-text .second-text {
      text-align: center;
    }
    .landing-cards .card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      text-align: center;
      min-height: clamp(63px, 10.5vw, 128px);
      width: 100%;
      border-radius: 22px;
      cursor: pointer;
      transition: 400ms transform, 400ms box-shadow, 400ms background-color;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
      border: none;
      padding: clamp(0.5rem, 1.5vw, 0.75rem) clamp(0.75rem, 3vw, 1.125rem);
      font-family: 'IBM Plex Sans Hebrew', sans-serif;
      font-style: normal;
      font-weight: 500;
      font-size: clamp(1rem, 4vw, 24px);
      line-height: 0.92;
      letter-spacing: 0.01em;
    }
    .landing-cards .card p.tip {
      font-size: inherit;
      font-weight: 500;
      margin: 0 0 0.1rem 0;
      line-height: 0.92;
      color: inherit;
    }
    .landing-cards .card p.second-text {
      font-size: clamp(0.8em, 2.5vw, 0.9em);
      font-weight: 500;
      margin: 0;
      opacity: 0.95;
      line-height: 0.92;
      color: inherit;
    }
    .landing-cards .card .landing-best {
      font-size: 0.75rem;
      color: #fff;
      opacity: 0.8;
      margin-top: 0.15rem;
      line-height: 1;
    }
    .landing-cards .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 16px rgba(0, 0, 0, 0.4);
      background-color: #242A38;
    }
    .landing-cards:hover > .card:not(:hover) {
      filter: blur(10px);
      transform: scale(0.9);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.2);
    }
    #options-container button { min-height: 44px; }

    /* 题干：放大约 20%，符合手机阅读 */
    #scenario {
      font-size: clamp(0.9375rem, 2.5vw, 1.125rem);
      line-height: 1.5;
    }

    /* 手机端全局文本放大，符合阅读习惯 */
    @media (max-width: 640px) {
      .landing-cards .card { font-size: 1.0625rem !important; }
      .landing-cards .card p.second-text { font-size: 0.875rem !important; }
      #chapter-name { font-size: 0.875rem !important; }
      #level-title { font-size: 0.9375rem !important; }
      #hp-warning { font-size: 0.875rem !important; }
      #progress-label { font-size: 0.875rem !important; }
      #scenario { font-size: 1rem !important; }
      #hand-zone > span { font-size: 0.875rem !important; }
      #explanation-title { font-size: 1.125rem !important; }
      #explanation-sheet .text-xs { font-size: 0.875rem !important; }
      #explanation-choice { font-size: 0.9375rem !important; }
      #sharky-feedback { font-size: 0.9375rem !important; line-height: 1.5; }
      #options-container button { font-size: 1rem !important; }
      #chapter-intro-text { font-size: 0.9375rem !important; }
      #chapter-done-message { font-size: 1.125rem !important; }
      #gameover-message { font-size: 0.9375rem !important; }
      #result-score-label { font-size: 0.9375rem !important; }
      #result-chapter-summary { font-size: 1rem !important; }
      .result-title { font-size: 1.25rem !important; }
      .result-comment { font-size: 0.9375rem !important; }
    }

    .toast-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 60;
      padding: 0.75rem 1rem;
      background: rgba(30, 41, 59, 0.98);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      font-size: 0.875rem;
      color: #fbbf24;
      animation: toastIn 0.25s ease-out;
    }
    .dark .toast-bar { background: rgba(17, 24, 39, 0.95); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 最终结算页：全屏；iOS Safari 对 100dvh 有 bug，用 100vh 兜底 */
    #result-page { display: none; opacity: 0; transition: opacity 0.3s ease; }
    #result-page.result-visible { display: flex; opacity: 1; height: 100vh; height: 100dvh; min-height: 100vh; min-height: -webkit-fill-available; min-height: 100dvh; }
    #result-page.result-exiting { opacity: 0; }
    #result-page { min-height: 100vh; min-height: 100dvh; }
    #result-page .result-page-actions { padding-bottom: max(1.5rem, env(safe-area-inset-bottom)); }
    /* 移动端全屏兜底：iOS Safari 对 100dvh 有 bug，用 100vh / -webkit-fill-available */
    body { min-height: 100vh; min-height: -webkit-fill-available; }
    #landing-page { min-height: 100vh; min-height: -webkit-fill-available; }
    #result-page .result-page-content { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #result-page .result-page-actions { flex: 0 0 auto; position: relative; z-index: 10; }
    #result-badge-img[src]:not([src=""]) { display: block !important; }
    .result-score {
      line-height: 1;
      text-shadow: 0 0 24px currentColor;
    }
    .result-score.tier-s { color: #60a5fa; text-shadow: 0 0 24px rgba(96, 165, 250, 0.6); }
    .result-score.tier-a { color: #34d399; text-shadow: 0 0 24px rgba(52, 211, 153, 0.5); }
    .result-score.tier-b { color: #f87171; text-shadow: 0 0 24px rgba(248, 113, 113, 0.5); }
    #result-dimension-chart { width: 100%; max-width: 20rem; margin: 1rem auto 0; }
    #result-dimension-chart .dimension-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem; font-size: 0.8125rem; }
    #result-dimension-chart .dimension-label { width: 2.25rem; flex-shrink: 0; color: #94a3b8; font-weight: 600; }
    #result-dimension-chart .dimension-bar-wrap { flex: 1; height: 0.5rem; background: rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden; }
    #result-dimension-chart .dimension-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; min-width: 0; }
    #result-dimension-chart .dimension-pct { width: 2.25rem; flex-shrink: 0; text-align: right; color: #cbd5e1; font-variant-numeric: tabular-nums; }
    .result-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.75rem; }
    .result-comment { font-size: 0.875rem; text-align: center; max-width: 22rem; line-height: 1.6; margin-bottom: 2rem; color: #475569; white-space: pre-line; }
    .dark .result-comment { color: #9ca3af; }

    /* 解说弹窗：9 人桌位置范围示意图（KJo UTG 等起手牌题） */
    .explanation-position-wrap.explanation-position-visible { display: block !important; }
    .explanation-position-diagram {
      display: flex;

      align-items: center;
      gap: 4px;
      padding: 8px;
      background: linear-gradient(145deg, #f1f5f9 0%, #e2e8f0 100%);
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }
    .dark .explanation-position-diagram { background: linear-gradient(145deg, #334155 0%, #1e293b 100%); border-color: rgba(71, 85, 105, 0.6); }
    .explanation-position-diagram .seat {
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #cbd5e1;
      color: #475569;
    }
    .dark .explanation-position-diagram .seat { background: #475569; color: #e2e8f0; }
    .explanation-position-diagram .seat.seat-utg { background: #f59e0b; color: #1f2937; box-shadow: 0 0 0 2px #d97706; }
    .dark .explanation-position-diagram .seat.seat-utg { background: #d97706; color: #fef3c7; box-shadow: 0 0 0 2px #f59e0b; }
    .explanation-position-diagram .seat.seat-you { font-size: 0.65rem; color: #b45309; }
    .dark .explanation-position-diagram .seat.seat-you { color: #fcd34d; }

    /* 9 人桌位置 SVG：呼吸灯效果（基础半透明 → 高亮发光+脉冲） */
    .explanation-position-diagram .pos-node {
      transition: all 0.3s ease;
      opacity: 0.3;
      stroke: transparent;
    }
    .explanation-position-diagram .pos-node.pos-active {
      opacity: 1 !important;
      stroke: #ffffff;
      stroke-width: 3px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8));
      animation: pulse-ring 1.5s infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* 分享战绩按钮：3D 风格 + 相机图标 */
    .btn-result-capture {
      border-bottom: 4px solid rgba(59, 130, 246, 0.8);
      transition: transform 0.15s, border-bottom-width 0.15s, filter 0.15s;
    }
    .btn-result-capture:hover { transform: translateY(-2px); border-bottom-width: 6px; filter: brightness(1.08); }
    .btn-result-capture:active { transform: translateY(1px); border-bottom-width: 2px; filter: brightness(0.95); }

    /* 战绩截图预览浮层 */
    #screenshot-preview-modal { display: none; }
    #screenshot-preview-modal.preview-visible { display: flex; }

    /* 竖版牌桌：椭圆形桌面（背景/边框由 Tailwind 明亮·暗黑类控制） */

      border-radius: 3rem;

    @media (min-width: 640px) {

    // ========== 轻量级音效引擎（Base64 内嵌 WAV，支持 file://） ==========
    // 提醒：目前的音频为程序生成的占位符，后续请替换为高品质的短促 UI 音效素材。
    (function () {
      function makeWavDataUri(freq, durationMs, amplitude) {
        amplitude = amplitude == null ? 1 : amplitude;
        var sampleRate = 8000;
        var numSamples = Math.floor((durationMs / 1000) * sampleRate);
        var buffer = new ArrayBuffer(44 + numSamples);
        var view = new DataView(buffer);
        function writeStr(offset, str) { for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); }
        writeStr(0, 'RIFF');
        view.setUint32(4, 36 + numSamples, true);
        writeStr(8, 'WAVE');
        writeStr(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate, true);
        view.setUint16(32, 1, true);
        view.setUint16(34, 8, true);
        writeStr(36, 'data');
        view.setUint32(40, numSamples, true);
        for (var i = 0; i < numSamples; i++) {
          var t = i / sampleRate;
          var sample = Math.floor(128 + 127 * amplitude * Math.sin(2 * Math.PI * freq * t));
          view.setUint8(44 + i, Math.max(0, Math.min(255, sample)));
        }
        var bytes = new Uint8Array(buffer);
        var binary = '';
        for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
        return 'data:audio/wav;base64,' + btoa(binary);
      }
      // 只保留特殊音效：答错 wrong、结算 victory（无点击音、无答对音）

        a2.play().catch(function () {});

    /** Fisher-Yates 洗牌：原地打乱数组，保证每种排列等概率，返回原数组引用 */
    function shuffle(array) {
      let i = array.length;
      let j;
      let t;
      while (i !== 0) {
        j = Math.floor(Math.random() * i);
        i--;
        t = array[i];
        array[i] = array[j];
        array[j] = t;
      }
      return array;
    }

    // 黑话名词高亮：【xxx】-> 荧光蓝加粗发光；题目文案适配竖版：左边->上方，右边->下方
    function highlightTerms(text) {
      if (!text || typeof text !== 'string') return '';
      let s = text.replace(/【([^】]+)】/g, '<span class="term-highlight">【$1】</span>');
      s = s.replace(/左边/g, '上方').replace(/右侧/g, '下方').replace(/右边/g, '下方');
      return s;
    }

    // 创建单张牌 DOM：使用 assets/cards 下的真实 SVG 图片（牌码 T = 10，需映射为 10 以匹配文件名）
    function createCardEl(code, small) {
      if (!code || code.length < 2) return document.createElement('div');
      const fileCode = (code.charAt(0) === 'T' || code.charAt(0) === 't') ? '10' + code.slice(1) : code;
      const img = document.createElement('img');
      img.src = 'assets/cards/' + fileCode + '.svg';
      img.alt = code;
      img.loading = 'lazy';
      img.className = 'flex-shrink-0 object-contain drop-shadow-md rounded-lg ' +
        (small ? 'w-10 h-14 sm:w-11 sm:h-[3.85rem]' : 'w-14 h-20 sm:w-16 sm:h-[5.5rem]');
      return img;
    }

      hand.forEach((code) => el.handContainer.appendChild(createCardEl(code, false)));

    // 更新心形血条 UI（5 颗心）；lastLostIndex 为刚失去的那颗心的序号 1~5，用于播放心碎震动
    function updateHPUI(lastLostIndex) {
      var hearts = [el.hpHeart1, el.hpHeart2, el.hpHeart3, el.hpHeart4, el.hpHeart5];
      hearts.forEach(function (node, i) {
        if (!node) return;
        var idx = i + 1;
        var isLost = idx > hp;
        node.classList.toggle('hp-lost', isLost);
        node.classList.remove('heart-shake', 'heart-blink');
        if (idx === lastLostIndex) node.classList.add('heart-shake');
      });
      if (hp <= 2 && el.hpHeart1) {
        el.hpHeart1.classList.add('heart-blink');
        if (el.hpWarning) el.hpWarning.classList.remove('hidden');
      } else if (el.hpWarning) {
        el.hpWarning.classList.add('hidden');

      if (lastLostIndex && el.hpContainer) {
        el.hpContainer.classList.remove('animate__animated', 'animate__shakeX');

          el.hpContainer.classList.add('animate__animated', 'animate__shakeX');
          setTimeout(function () {

          }, 1000);

      }
      if (posId) {
        renderPositionDiagramWithHighlight(el.explanationPositionDiagram, posId);
      } else {
        el.explanationPositionDiagram.innerHTML = '';
        NINE_SEATS.forEach(function (s) {
          var span = document.createElement('span');
          span.className = 'seat' + (s.isUtg ? ' seat-utg' : '');
          span.textContent = s.label;
          span.title = s.name || s.label;
          el.explanationPositionDiagram.appendChild(span);
        });
        var youLabel = document.createElement('span');
        youLabel.className = 'seat seat-you w-full text-center';
        youLabel.textContent = '↑ UTG = 你在这里，最先行动';
        el.explanationPositionDiagram.appendChild(youLabel);
      }

      var termsHtml = '';
      if (level.level_id === 11) {
        termsHtml =
          '<p class="font-semibold text-slate-700 dark:text-slate-300">为何 UTG 用 KJo 加注是错误？</p>' +
          '<p><strong>隔离 (Isolation)</strong>：你加注后，后位玩家会用 3-Bet（反加）把你「隔离」进单挑底池，他们的 3-Bet 范围多为 AK/AQ/AJ/KQ/QQ+ 等强牌，你 KJo 面对这些范围胜率极低，只能弃牌，等于白送加注的筹码。</p>' +
          '<p><strong>被主导 (Dominated)</strong>：KJo 被 AK、AQ、AJ、KQ 等「主导」——对方与你共享高牌（K 或 J）但踢脚更强，或牌力完全覆盖你。翻牌后你中 K 或 J 时，对手常能赢更多或让你难以抉择，长期 -EV。</p>';
      } else if (level.level_id === 2) {
        termsHtml =
          '<p class="font-semibold text-slate-700 dark:text-slate-300">枪口位 (UTG)</p>' +
          '<p>全桌最先行动，信息最少，手牌范围应最紧。72o 在此位置加注或跟注都是严重错误。</p>';
      } else if (posId) {
        if (POS_EP_IDS.indexOf(posId) !== -1) {
          termsHtml = '<p class="font-semibold text-amber-700 dark:text-amber-400">早位 (EP)</p><p>看看你的位置！你是在枪口下跳舞，稍微拿错一张牌就是自杀。范围要最紧。</p>';
        } else if (POS_LP_IDS.indexOf(posId) !== -1) {
          termsHtml = '<p class="font-semibold text-emerald-700 dark:text-emerald-400">后位 (LP)</p><p>这个位置你都不敢加注？你是来桌上喝矿泉水的吗？用好位置偷盲、隔离。</p>';
        } else {
          termsHtml = '<p class="font-semibold text-slate-700 dark:text-slate-300">位置示意图</p><p>高亮圆点 = 本题你的座位。SB/BB 不要为底池硬防；BTN 是你的领地。</p>';
        }
      }
      el.explanationPositionTerms.innerHTML = termsHtml;
      el.explanationPositionWrap.classList.remove('hidden');
      el.explanationPositionWrap.classList.add('explanation-position-visible');
    }

    // 展示反馈解说弹窗（动态标题 + 气泡 + Sharky 头像 + 可选位置示意图）
    function showFeedback(option, level) {
      if (el.explanationTitle) {
        el.explanationTitle.textContent = getFeedbackTitle(option.is_correct);
        el.explanationTitle.classList.remove('animate__animated', 'animate__flash');
        requestAnimationFrame(function () {
          el.explanationTitle.classList.add('animate__animated', 'animate__flash');
        });
      }
      el.sharkyFeedback.textContent = option.sharky_feedback;

      var avatarWrap = document.getElementById('sharky-avatar-wrap');
      if (avatarWrap) {
        avatarWrap.classList.remove('animate__animated', 'animate__bounceIn');
        requestAnimationFrame(function () {
          avatarWrap.classList.add('animate__animated', 'animate__bounceIn');
        });
      }

      el.explanationCards.innerHTML = '';
      [...(level.hand || []), ...(level.board || [])].forEach(function (code) {
        el.explanationCards.appendChild(createCardEl(code, true));
      });
      el.explanationChoice.textContent = '';
      el.explanationChoice.className = 'text-sm font-medium py-1 ';
      if (option.is_correct) {
        el.explanationChoice.classList.add('text-green-600');
        el.explanationChoice.textContent = '你的选择：' + option.action + ' ✅';
      } else {
        el.explanationChoice.classList.add('text-red-600');
        el.explanationChoice.textContent = '你的选择：' + option.action + ' ❌';
      }

      renderPositionDiagramAndTerms(level);

      modalShowsWrongAnswer = !option.is_correct;
      el.btnNextLevel.textContent = option.is_correct ? '继续' : '重新选择';

      el.explanationSheet.classList.add('boing-in');
      el.sharkyModal.classList.remove('hidden');
      el.sharkyModal.classList.add('flex');
    }

    // 选项点击：计分 + 维度统计 + 效果 + 打开解说弹窗（战局重现 + Sharky 毒舌解说）
    function onOptionClick(option, button) {
      if (chosenOption !== null) return;
      chosenOption = option;
      totalQuestions++;
      if (option.is_correct) correctCount++;
      var level = getCurrentLevel();
      var w = (level && DIFFICULTY_WEIGHT[level.difficulty]) ? DIFFICULTY_WEIGHT[level.difficulty] : 1;
      sessionWeightTotal += w;
      if (option.is_correct) sessionWeightCorrect += w;
      var cat = (level && (level.category != null && level.category !== '' ? level.category : LEVEL_CATEGORY[level.level_id])) || '牌力';
      if (!sessionDimensionStats[cat]) sessionDimensionStats[cat] = { correct: 0, total: 0 };
      sessionDimensionStats[cat].total++;
      if (option.is_correct) sessionDimensionStats[cat].correct++;
      sessionAnswerTimes.push(Date.now() - currentQuestionStartTime);

      if (!option.is_correct) {
        comboCount = 0;
        hp--;
        updateHPUI(hp + 1);
        if (hp === 0) {
          playResultEffect(false);
          if (window.audioEngine) audioEngine.play('wrong');
          var rollbackTo = currentDifficulty === 'pro' ? 'casual' : 'beginner';
          if (el.gameoverMessage) el.gameoverMessage.textContent = '生命耗尽！回滚回上一关再练练吧。';
          el.gameoverModal.classList.remove('hidden');
          el.gameoverModal.classList.add('flex');
          setTimeout(function () {
            el.gameoverModal.classList.add('hidden');
            el.gameoverModal.classList.remove('flex');
            hp = 5;
            updateHPUI();
            startGame(rollbackTo);
          }, 3200);
          return;
        }
      } else {
        comboCount++;
        if (comboCount > maxComboCount) maxComboCount = comboCount;
        if (comboCount >= 5 && el.flashLayer) {
          el.flashLayer.classList.remove('flash-green', 'flash-red');
          el.flashLayer.classList.add('flash-combo');
          setTimeout(function () { if (el.flashLayer) el.flashLayer.classList.remove('flash-combo'); }, 650);
        }
      }

      playResultEffect(option.is_correct);
      if (window.audioEngine && !option.is_correct) audioEngine.play('wrong');
      if (option.is_correct && typeof confetti === 'function') {
        confetti({ origin: { x: 0.5, y: 0.5 }, particleCount: 90, spread: 70 });
      }

      if (!level) level = getCurrentLevel();
      showFeedback(option, level);
    }

    // 时间回溯：答错时仅关闭弹窗，留在当前题重新选择（HP 允许为负，仅作评分参考，不 Game Over）
    function closeModalAndRetry() {
      el.explanationSheet.classList.remove('boing-in');
      el.sharkyModal.classList.add('hidden');
      el.sharkyModal.classList.remove('flex');
      chosenOption = null;
    }

    // “进入下一关”：答对时进入下一题；本局 5 题全部做完则进入结算页
    function goNextLevel() {
      el.explanationSheet.classList.remove('boing-in');
      el.sharkyModal.classList.add('hidden');
      el.sharkyModal.classList.remove('flex');
      chosenOption = null;

      const totalInSession = getCurrentLevelsCount();
      currentLevelIndex++;

      if (currentLevelIndex < totalInSession) {
        hp = 5;
        updateHPUI();
        renderLevel();
        return;
      }
      // 萌新 / 野生过关：弹出「进入下一章」，点击后进入下一难度
      if (currentDifficulty === 'beginner') {
        if (el.chapterDoneMessage) el.chapterDoneMessage.textContent = '恭喜完成新手训练！点击下方进入下一章～';
        el.chapterDoneModal.classList.remove('hidden');
        el.chapterDoneModal.classList.add('flex');
        if (window.audioEngine) audioEngine.play('victory');
        return;
      }
      if (currentDifficulty === 'casual') {
        if (el.chapterDoneMessage) el.chapterDoneMessage.textContent = '恭喜过关！点击下方进入懂哥挑战～';
        el.chapterDoneModal.classList.remove('hidden');
        el.chapterDoneModal.classList.add('flex');
        if (window.audioEngine) audioEngine.play('victory');
        return;
      }
      showResultPage(false);
    }

    // 最终结算页：得分 + 五维能力条形图 + Sharky 终极评价（专业工具感）
    function showResultPage(deadByHP) {
      el.gameScreen.style.display = 'none';
      el.sharkyModal.classList.add('hidden');
      el.chapterDoneModal.classList.add('hidden');
      el.gameoverModal.classList.add('hidden');
      el.victoryModal.classList.add('hidden');

      var weightedScore = sessionWeightTotal > 0 ? Math.round((sessionWeightCorrect / sessionWeightTotal) * 100) : 0;
      const chapterName = currentChapterName || '本关卡';
      el.resultScore.textContent = weightedScore + ' 分';
      el.resultChapterSummary.textContent = '本局答对 ' + correctCount + '/15 题 · 加权得分 ' + weightedScore + ' 分';
      // 近期表现：最近 3 局加权得分，不足 3 局提示「再玩 N 局解锁平均分」
      var storageKey = 'pokerJourney_lastScores';
      var lastScores = [];
      try {
        var raw = localStorage.getItem(storageKey);
        if (raw) lastScores = JSON.parse(raw);
      } catch (e) {}
      lastScores.push(weightedScore);
      lastScores = lastScores.slice(-3);
      try { localStorage.setItem(storageKey, JSON.stringify(lastScores)); } catch (e) {}
      if (el.resultAvgSummary) {
        if (lastScores.length >= 3) {
          var avg = Math.round(lastScores.reduce(function (a, b) { return a + b; }, 0) / 3);
          el.resultAvgSummary.textContent = '近 3 局平均表现：' + avg + ' 分';
          el.resultAvgSummary.style.display = '';
        } else {
          var needMore = 3 - lastScores.length;
          el.resultAvgSummary.textContent = '再玩 ' + needMore + ' 局解锁平均分';
          el.resultAvgSummary.style.display = '';
        }
      }

      // 答题耗时：本局总用时 + 平均每题用时，用于 90+「快/稳」判定与展示
      var FAST_AVG_MS = 15 * 1000;
      var totalTimeMs = sessionAnswerTimes.length ? sessionAnswerTimes.reduce(function (a, b) { return a + b; }, 0) : 0;
      var avgTimeMs = sessionAnswerTimes.length ? totalTimeMs / sessionAnswerTimes.length : 0;
      var totalSec = Math.round(totalTimeMs / 1000);
      var avgSec = avgTimeMs ? Math.round(avgTimeMs / 1000) : 0;
      var timeStr = totalSec >= 60 ? (Math.floor(totalSec / 60) + '分' + (totalSec % 60) + '秒') : (totalSec + '秒');
      if (el.resultTimeSummary) {
        el.resultTimeSummary.textContent = '本局用时 ' + timeStr + ' · 平均 ' + avgSec + '秒/题';
        el.resultTimeSummary.style.display = totalTimeMs > 0 ? '' : 'none';
      }
      var isFast = weightedScore >= 90 && avgTimeMs > 0 && avgTimeMs <= FAST_AVG_MS;

      // 五维能力条形图：按 DIMENSION_NAMES 顺序渲染，无答题的维度显示 0%
      var barColors = ['#34d399', '#60a5fa', '#a78bfa', '#f472b6', '#fbbf24'];
      if (el.resultDimensionBars) {
        el.resultDimensionBars.innerHTML = '';
        DIMENSION_NAMES.forEach(function (dim, i) {
          var st = sessionDimensionStats[dim] || { correct: 0, total: 0 };
          var pct = st.total ? Math.round((st.correct / st.total) * 100) : 0;
          var row = document.createElement('div');
          row.className = 'dimension-row';
          row.innerHTML =
            '<span class="dimension-label">' + dim + '</span>' +
            '<div class="dimension-bar-wrap"><div class="dimension-bar-fill" style="width:' + pct + '%;background:' + barColors[i % barColors.length] + '"></div></div>' +
            '<span class="dimension-pct">' + pct + '%</span>';
          el.resultDimensionBars.appendChild(row);
        });
      }

      var wrongCount = totalQuestions - correctCount;
      var DIMENSION_DISPLAY_NAMES = { '牌力': '牌力判断', '位置': '位置意识', '赔率': '赔率计算', '心理': '心理博弈', '纪律': '纪律与取舍' };
      var DIMENSION_WEAKNESS_TIPS = {
        '牌力': '建议多练起手牌强度与翻牌后牌力判断。',
        '位置': '建议关注 BTN 位的偷盲时机与早位范围收紧。',
        '赔率': '建议熟记听牌补牌数与底池赔率。',
        '心理': '建议区分价值下注与诈唬，读懂对手范围。',
        '纪律': '建议少追牌、少硬防，该弃就弃。'
      };
      var weaknessDim = '';
      var weaknessKey = '';
      var maxWrong = 0;
      DIMENSION_NAMES.forEach(function (d) {
        var st = sessionDimensionStats[d] || { correct: 0, total: 0 };
        var w = st.total - st.correct;
        if (st.total > 0 && w > maxWrong) { maxWrong = w; weaknessDim = DIMENSION_DISPLAY_NAMES[d] || d; weaknessKey = d; }
      });

      el.resultScore.classList.remove('tier-s', 'tier-a', 'tier-b');
      var title = '';
      var comment = '';
      var tierClass = 'tier-b';
      if (correctCount === totalQuestions && totalQuestions === QUESTIONS_PER_GAME) {
        title = '【顶级掠食者 Apex Predator】';
        comment = '15 题全对。\n\n' +
          (maxComboCount >= 5 ? '连对 ' + maxComboCount + ' 题，直觉在线。' : '') +
          (isFast ? ' 平均 ' + avgSec + ' 秒/题，又快又准。' : '') +
          ' 牌力、位置、赔率、心理、纪律全开，老王见了你得绕道。';
        tierClass = 'tier-s';
      } else if (wrongCount >= 1 && wrongCount <= 2 && totalQuestions === QUESTIONS_PER_GAME) {
        title = '【职业鲨鱼 Pro Shark】';
        comment = '错 1～2 题，已是高手区间。\n\n' +
          (maxComboCount >= 5 ? '本局曾连对 ' + maxComboCount + ' 题，直觉评分加持。' : '') +
          ' 稍补短板即可冲击全对。';
        tierClass = 'tier-a';
      } else {
        title = '【待宰羔羊】';
        comment = '本局错题较多，建议针对性补强。\n\n' +
          '多看复盘、重点练弱项，再战不迟。';
        tierClass = 'tier-b';
      }
      if (el.resultWeakness) {
        if (weaknessDim && wrongCount >= 1) {
          var tip = (weaknessKey && DIMENSION_WEAKNESS_TIPS[weaknessKey]) ? DIMENSION_WEAKNESS_TIPS[weaknessKey] : '建议针对性补强该维度。';
          el.resultWeakness.textContent = '你的弱点：' + weaknessDim + '。' + tip;
          el.resultWeakness.classList.remove('hidden');
        } else {
          el.resultWeakness.classList.add('hidden');
        }
      }
      if (el.resultComboSummary) {
        el.resultComboSummary.style.display = '';
        el.resultComboSummary.textContent = '最长连对次数：' + maxComboCount + (maxComboCount >= 5 ? '（直觉在线）' : '');
      }
      el.resultTitle.textContent = title;
      el.resultTitle.className = 'result-title ' + (tierClass === 'tier-s' ? 'text-amber-400' : tierClass === 'tier-a' ? 'text-green-400' : 'text-red-400');
      el.resultComment.textContent = comment;
      el.resultComment.className = 'result-comment ' + (tierClass === 'tier-s' ? 'text-amber-200/90' : tierClass === 'tier-a' ? 'text-green-200/90' : 'text-red-200/90');
      el.resultScore.classList.add(tierClass);

      var bestKey = 'pokerJourney_best_' + currentDifficulty;
      try {
        var bestRaw = localStorage.getItem(bestKey);
        var best = bestRaw ? JSON.parse(bestRaw) : { correct: 0, total: QUESTIONS_PER_GAME, weightedScore: 0 };
        var prevScore = best.weightedScore != null ? best.weightedScore : (best.total ? Math.round((best.correct / best.total) * 100) : 0);
        if (weightedScore > prevScore || (weightedScore === prevScore && correctCount >= best.correct)) {
          localStorage.setItem(bestKey, JSON.stringify({ correct: correctCount, total: totalQuestions, weightedScore: weightedScore }));
        }
      } catch (e) {}
      el.resultPage.classList.remove('result-exiting');
      el.resultPage.classList.add('result-visible');
      el.resultPage.style.display = 'flex';
      if (window.audioEngine) audioEngine.play('victory');
    }

    // “进入下一章”：萌新→野生票友，野生票友→懂哥；离开前保存本难度最佳成绩（按加权分比较）
    function goNextChapter() {
      var weightedScore = sessionWeightTotal > 0 ? Math.round((sessionWeightCorrect / sessionWeightTotal) * 100) : 0;
      var bestKey = 'pokerJourney_best_' + currentDifficulty;
      try {
        var bestRaw = localStorage.getItem(bestKey);
        var best = bestRaw ? JSON.parse(bestRaw) : { correct: 0, total: QUESTIONS_PER_GAME, weightedScore: 0 };
        var prevScore = best.weightedScore != null ? best.weightedScore : (best.total ? Math.round((best.correct / best.total) * 100) : 0);
        if (weightedScore > prevScore || (weightedScore === prevScore && correctCount >= best.correct)) {
          localStorage.setItem(bestKey, JSON.stringify({ correct: correctCount, total: totalQuestions, weightedScore: weightedScore }));
        }
      } catch (e) {}
      el.chapterDoneModal.classList.add('hidden');
      el.chapterDoneModal.classList.remove('flex');
      if (currentDifficulty === 'beginner') startGame('casual');
      else if (currentDifficulty === 'casual') startGame('pro');
    }

    // 重新开始：返回首页（隐藏结算与答题界面，显示欢迎页）
    function restart() {
      el.resultPage.classList.remove('result-visible', 'result-exiting');
      el.resultPage.style.display = 'none';
      el.gameScreen.style.display = 'none';
      el.gameScreen.classList.remove('game-screen-visible');
      el.gameoverModal.classList.add('hidden');
      el.gameoverModal.classList.remove('flex');
      el.victoryModal.classList.add('hidden');
      el.victoryModal.classList.remove('flex');
      el.chapterDoneModal.classList.add('hidden');
      el.chapterDoneModal.classList.remove('flex');
      el.landingPage.style.display = 'flex';
    }

    // 重置本局状态（HP、得分、题目缓存），不清理 localStorage，保证下次从全量题库重新 shuffle 抽题
    function resetGameState() {
      lastSessionQuestionIdsByChapter = {};
      hp = 5;
      MAX_HP = 5;
      correctCount = 0;
      totalQuestions = 0;
      sessionWeightCorrect = 0;
      sessionWeightTotal = 0;
      sessionDimensionStats = {};
      DIMENSION_NAMES.forEach(function (d) { sessionDimensionStats[d] = { correct: 0, total: 0 }; });
      sessionAnswerTimes = [];
      comboCount = 0;
      maxComboCount = 0;
      currentLevelIndex = 0;
      chosenOption = null;
      currentSessionQuestions = [];
      currentChapterName = '';
      currentDifficulty = 'beginner';
      if (el.hpContainer) updateHPUI();
    }

    // 从结算页平滑返回首页：先淡出再 reset + restart，并刷新首页 Best Score
    function goBackToStart() {
      el.resultPage.classList.add('result-exiting');
      setTimeout(function () {
        resetGameState();
        restart();
        if (typeof updateLandingBestScores === 'function') updateLandingBestScores();
      }, 320);
    }

    el.btnNextLevel.addEventListener('click', function () {
      if (modalShowsWrongAnswer) closeModalAndRetry();
      else goNextLevel();
    });
    el.btnNextChapter.addEventListener('click', goNextChapter);
    el.btnRestart.addEventListener('click', restart);
    el.btnVictoryRestart.addEventListener('click', restart);
    document.getElementById('btn-result-retry').addEventListener('click', goBackToStart);

    // ---------- 战绩截图：html2canvas 捕获 result-page，弹窗展示图片并提示长按保存 ----------
    const screenshotModal = document.getElementById('screenshot-preview-modal');
    const screenshotPreviewImg = document.getElementById('screenshot-preview-img');
    const screenshotLoadingOverlay = document.getElementById('screenshot-loading-overlay');
    const screenshotLoadingIcon = document.getElementById('screenshot-loading-icon');
    const btnScreenshotClose = document.getElementById('btn-screenshot-close');

    function captureResult() {
      const target = document.getElementById('result-page');
      if (!target || typeof html2canvas !== 'function') return;
      if (screenshotLoadingOverlay) {
        screenshotLoadingOverlay.classList.remove('hidden');
        screenshotLoadingOverlay.classList.add('flex');
      }
      if (screenshotLoadingIcon) {
        screenshotLoadingIcon.classList.add('animate__animated', 'animate__pulse', 'animate__infinite');
      }
      html2canvas(target, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: null,
        logging: false,
        windowWidth: target.scrollWidth,
        windowHeight: target.scrollHeight
      }).then(function (canvas) {
        if (screenshotLoadingOverlay) {
          screenshotLoadingOverlay.classList.add('hidden');
          screenshotLoadingOverlay.classList.remove('flex');
        }
        if (screenshotLoadingIcon) {
          screenshotLoadingIcon.classList.remove('animate__animated', 'animate__pulse', 'animate__infinite');
        }
        var dataUrl = canvas.toDataURL('image/png');
        screenshotPreviewImg.src = dataUrl;
        screenshotPreviewImg.classList.remove('animate__animated', 'animate__zoomInDown');
        requestAnimationFrame(function () {
          screenshotPreviewImg.classList.add('animate__animated', 'animate__zoomInDown');
        });
        screenshotModal.classList.add('preview-visible');
        screenshotModal.classList.add('flex');
      }).catch(function (err) {
        console.warn('战绩截图失败', err);
        if (screenshotLoadingOverlay) {
          screenshotLoadingOverlay.classList.add('hidden');
          screenshotLoadingOverlay.classList.remove('flex');
        }
        if (screenshotLoadingIcon) {
          screenshotLoadingIcon.classList.remove('animate__animated', 'animate__pulse', 'animate__infinite');
        }
      });
    }

    function closeScreenshotPreview() {
      screenshotModal.classList.remove('preview-visible', 'flex');
      screenshotPreviewImg.removeAttribute('src');
      screenshotPreviewImg.classList.remove('animate__animated', 'animate__zoomInDown');
    }

    document.getElementById('btn-result-share').addEventListener('click', captureResult);
    if (btnScreenshotClose) btnScreenshotClose.addEventListener('click', closeScreenshotPreview);
    if (screenshotModal) screenshotModal.addEventListener('click', function (e) {
      if (e.target === screenshotModal) closeScreenshotPreview();
    });

    // ---------- 欢迎页：分层抽题（5 easy + 5 medium + 5 hard）+ 难度权重得分 ----------
    /** 从池中排除已用题后洗牌取前 n 道；不足则返回全部 */
    function takeFromPool(pool, usedIds, n) {
      var list = usedIds && usedIds.length ? pool.filter(function (q) { return usedIds.indexOf(q.level_id) === -1; }) : pool.slice();
      if (list.length < n) list = pool.slice();
      shuffle(list);
      return list.slice(0, n);
    }

    function startGame(difficulty) {
      const config = typeof CHAPTER_CONFIG !== 'undefined' ? CHAPTER_CONFIG[difficulty] : null;
      if (!config) return;

      const chapterName = config.name;
      const all = typeof allQuestions !== 'undefined' ? allQuestions : [];
      var easyChapter = '纸面萌新';
      var mediumChapter = '野生票友';
      var hardChapter = '资深懂哥';

      // 1. 分层抽题：easy 5 + medium 5 + hard 5（某类不足则由其余池补位）
      var poolEasy = all.filter(function (q) { return q.chapter === easyChapter; });
      var poolMedium = all.filter(function (q) { return q.chapter === mediumChapter; });
      var poolHard = all.filter(function (q) { return q.chapter === hardChapter; });
      var usedEasy = lastSessionQuestionIdsByChapter[easyChapter] || [];
      var usedMedium = lastSessionQuestionIdsByChapter[mediumChapter] || [];
      var usedHard = lastSessionQuestionIdsByChapter[hardChapter] || [];

      var takeEasy = takeFromPool(poolEasy, usedEasy, 5);
      var takeMedium = takeFromPool(poolMedium, usedMedium, 5);
      var takeHard = takeFromPool(poolHard, usedHard, 5);
      var need = QUESTIONS_PER_GAME - (takeEasy.length + takeMedium.length + takeHard.length);
      if (need > 0) {
        var rest = [];
        poolEasy.forEach(function (q) { if (takeEasy.indexOf(q) === -1) rest.push(q); });
        poolMedium.forEach(function (q) { if (takeMedium.indexOf(q) === -1) rest.push(q); });
        poolHard.forEach(function (q) { if (takeHard.indexOf(q) === -1) rest.push(q); });
        shuffle(rest);
        for (var i = 0; i < rest.length && (takeEasy.length < 5 || takeMedium.length < 5 || takeHard.length < 5); i++) {
          if (takeEasy.length < 5) takeEasy.push(rest[i]);
          else if (takeMedium.length < 5) takeMedium.push(rest[i]);
          else takeHard.push(rest[i]);
        }
      }

      currentSessionQuestions = takeEasy.concat(takeMedium).concat(takeHard);
      if (currentSessionQuestions.length < QUESTIONS_PER_GAME) {
        var usedIds = currentSessionQuestions.map(function (q) { return q.level_id; });
        var fallbackPool = all.filter(function (q) { return usedIds.indexOf(q.level_id) === -1; });
        shuffle(fallbackPool);
        for (var j = 0; currentSessionQuestions.length < QUESTIONS_PER_GAME && j < fallbackPool.length; j++) {
          currentSessionQuestions.push(fallbackPool[j]);
        }
      }
      if (currentSessionQuestions.length === 0 && all.length > 0) {
        var fullCopy = all.slice();
        shuffle(fullCopy);
        currentSessionQuestions = fullCopy.slice(0, Math.min(QUESTIONS_PER_GAME, fullCopy.length));
      }
      shuffle(currentSessionQuestions);

      [easyChapter, mediumChapter, hardChapter].forEach(function (ch) {
        if (!lastSessionQuestionIdsByChapter[ch]) lastSessionQuestionIdsByChapter[ch] = [];
        currentSessionQuestions.forEach(function (q) {
          if (q.chapter === ch && lastSessionQuestionIdsByChapter[ch].indexOf(q.level_id) === -1) {
            lastSessionQuestionIdsByChapter[ch].push(q.level_id);
          }
        });
      });

      currentChapterName = chapterName;
      currentLevelIndex = 0;
      currentDifficulty = difficulty;
      chosenOption = null;
      correctCount = 0;
      totalQuestions = 0;
      sessionWeightCorrect = 0;
      sessionWeightTotal = 0;
      sessionDimensionStats = {};
      DIMENSION_NAMES.forEach(function (d) { sessionDimensionStats[d] = { correct: 0, total: 0 }; });
      sessionAnswerTimes = [];
      comboCount = 0;
      maxComboCount = 0;
      currentHP = 5;
      MAX_HP = 5;
      hp = 5;
      updateHPUI();

      el.landingPage.style.display = 'none';
      el.gameScreen.classList.add('game-screen-visible');
      el.gameScreen.style.display = 'block';

      el.introTitle.textContent = '【' + chapterName + '】';
      el.introText.textContent = config.intro || '';
      el.introModal.classList.remove('hidden');
      el.introModal.classList.add('flex');

      if (difficulty === 'pro') {
        const toast = document.createElement('div');
        toast.className = 'toast-bar';
        toast.textContent = '哟，懂哥来了？希望你的逻辑和你的嘴一样硬。';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }
    }

    function closeIntroAndStartFirstQuestion() {
      el.introModal.classList.add('hidden');
      el.introModal.classList.remove('flex');
      requestAnimationFrame(() => {
        updateHPUI();
        renderLevel();
      });
    }

    el.btnIntroReady.addEventListener('click', closeIntroAndStartFirstQuestion);

    function updateLandingBestScores() {
      var keys = { a: 'beginner', b: 'casual', c: 'pro' };
      ['a', 'b', 'c'].forEach(function (k) {
        var elBest = document.getElementById('landing-best-' + k);
        if (!elBest) return;
        try {
          var raw = localStorage.getItem('pokerJourney_best_' + keys[k]);
          var best = raw ? JSON.parse(raw) : null;
          if (best && best.total && best.correct >= 0) {
            elBest.textContent = 'Best: ' + best.correct + '/' + best.total;
            elBest.classList.remove('hidden');
            elBest.setAttribute('aria-hidden', 'false');
          } else {
            elBest.classList.add('hidden');
            elBest.setAttribute('aria-hidden', 'true');
          }
        } catch (e) {
          elBest.classList.add('hidden');
          elBest.setAttribute('aria-hidden', 'true');
        }
      });
    }
    updateLandingBestScores();
    document.getElementById('landing-btn-a').addEventListener('click', () => startGame('beginner'));
    document.getElementById('landing-btn-b').addEventListener('click', () => startGame('casual'));
    document.getElementById('landing-btn-c').addEventListener('click', () => startGame('pro'));

    // ---------- 主题切换（Tailwind Class 模式：html.dark = 暗黑，无 dark = 明亮） ----------
    function updateThemeIcon() {
      const icon = document.getElementById('theme-icon');
      if (!icon) return;
      icon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
    }
    document.getElementById('theme-toggle').addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      updateThemeIcon();
    });
    updateThemeIcon();

    // 初始状态：只显示欢迎页；点击萌新/票友/懂哥后 startGame('beginner'|'casual'|'pro')，按 chapter 过滤抽 6 题，先出关卡介绍再答题
  </script>
</body>
</html>
